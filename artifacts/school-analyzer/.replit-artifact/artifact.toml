kind = "web"
previewPath = "/"
title = "School Grade Analyzer"
version = "1.0.0"
id = "artifacts/school-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20053

[services.development]
run = "pnpm --filter @workspace/school-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-analyzer", "run", "build" ]
publicDir = "artifacts/school-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20053"
BASE_PATH = "/"
