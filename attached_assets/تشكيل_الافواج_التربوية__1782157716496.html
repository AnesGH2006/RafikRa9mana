<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #2980b9;
            --success: #27ae60;
            --excel-color: #1f7246;
            --bg: #f5f7fa;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1150px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
        .control-panel {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #eef2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .switch-group { display: flex; align-items: center; gap: 10px; margin-top: 20px; cursor: pointer;}
        label { font-weight: bold; font-size: 10.5pt; }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 11pt;
            font-family: 'Cairo', sans-serif;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 11px 22px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 22px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn:hover { background: #21618c; }
        .status { margin-top: 10px; font-weight: bold; color: var(--success); }
        
        .review-section {
            background: #fffcf3;
            border: 1px solid #f39c12;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            max-height: 250px;
            overflow-y: auto;
        }
        .review-title { font-weight: bold; color: #e67e22; margin-bottom: 10px; font-size: 11pt; }
        .review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .review-item { background: #fff; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 10pt; }

        /* -------------------------------------------------------------
           التنسيق القياسي والآمن لمنع الانقسام والالتزام بصفحة واحدة
        ------------------------------------------------------------- */
        .print-page {
            background: white;
            width: 210mm;      
            margin: 15px auto;
            padding: 8mm 10mm; 
            box-sizing: border-box;
            font-family: 'Amiri', serif; 
            color: #000;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            page-break-after: always;
            page-break-inside: avoid; /* منع انقسام محتوى الفوج التربوي الواحد كلياً */
        }
        
        .print-page:last-child {
            page-break-after: avoid;
        }
        
        .official-header {
            width: 100%;
            margin-bottom: 8px;
            font-size: 10.5pt;
            line-height: 1.25;
        }
        .header-center {
            text-align: center;
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 1px;
        }
        .header-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 2px;
        }
        .header-right-side {
            text-align: right;
            font-weight: bold;
        }
        .header-left-side {
            text-align: left;
            font-weight: bold;
        }

        .document-title {
            text-align: center;
            font-size: 13.5pt;
            font-weight: bold;
            margin: 8px 0;
        }
        .document-title span {
            border-bottom: 1.5px solid #000;
            padding-bottom: 1px;
            display: inline-block;
        }
        
        .group-stats-box {
            background: #fff;
            border: 1px solid #000;
            padding: 4px 8px;
            margin-bottom: 10px;
        }
        .stats-line {
            font-size: 10pt;
            font-weight: bold;
            display: flex;
            gap: 25px;
        }
        
        .table-container {
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
        }
        th, td {
            border: 1px solid #000; 
            padding: 2.5px 4px; /* حشو دقيق جداً لضمان استيعاب القوائم الطويلة */
            text-align: center;
            font-size: 10.5pt; /* حجم خط مثالي للوثائق الرسمية المتكاملة */
            color: #000;
            line-height: 1.25;
        }
        th { background: #f2f2f2; font-weight: bold; padding: 4px 4px; }

        .official-footer {
            margin-top: 15px; 
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-weight: bold;
            font-size: 10.5pt;
            padding-left: 60px;
            line-height: 1.3;
            page-break-inside: avoid;
        }

        @style page {
            size: A4 portrait;
            margin: 6mm; 
        }

        @media print {
            .control-panel, .review-section, h2, .status { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .print-page { 
                border: none !important; 
                box-shadow: none !important;
                margin: 0 auto !important;
                padding: 2mm 0mm !important;
                width: 100% !important;
            }
            th { background: #e6e6e6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2><span style="color:var(--accent)">📋</span> منظومة توزيع الأفواج التربوية المتوازنة - متوسطة ..................</h2>
    
    <div class="control-panel">
        <div class="form-group">
            <label>اختر الملف المرجع (Excel):</label>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
        </div>
        <div class="form-group">
            <label>عدد الأفواج المطلوب تشكيلها:</label>
            <input type="number" id="groups-count" min="2" max="10" value="3" style="width: 70px;">
        </div>
        
        <div class="switch-group" title="تفعيل هذا الخيار سيرتب التلاميذ داخل كل فوج ترتيباً أبجدياً">
            <label class="switch">
                <input type="checkbox" id="sort-alphabetical">
                <span class="slider"></span>
            </label>
            <label style="cursor:pointer; font-weight: bold; color: var(--primary);">ترتيب القوائم النهائية أبجدياً</label>
        </div>

        <button class="btn" id="process-btn">⚙️ توزيع وتوليد الأفواج</button>
        <button class="btn" style="background:#7f8c8d" onclick="window.print()">🖨️ طباعة القوائم</button>
        <button class="btn" id="export-excel-btn" style="background: var(--excel-color); display: none;">📥 تصدير كل الأفواج إلى ملف Excel</button>
    </div>

    <div id="review-panel" class="review-section" style="display:none;">
        <div class="review-title">⚠️ لوحة التدقيق السريع وتعديل الجنس (يرجى مراجعة وتصحيح أي تلميذ قبل التوزيع):</div>
        <div class="review-grid" id="review-grid-container"></div>
    </div>

    <div id="file-info" class="status"></div>
    <div id="output-container"></div>
</div>

<script>
    let rawData = [];
    let processedGroups = []; 
    const nameKey = 'اللقب و الاسم';
    const gpaKey = 'المعدل';
    const sexKey = 'الجنس';
    const repeatKey = 'الإعادة';

    function predictSexInitial(fullName) {
        if (!fullName) return "ذكر";
        const words = fullName.trim().split(/\s+/);
        const femaleKeywords = ["إخلاص", "اخلاص", "سلمى", "سجى", "مريم", "إيمان", "ايمان", "كوثر", "منال", "هدى", "ندى", "شيماء", "نهال", "ملاك", "نور", "بشرى", "امال", "سهام", "خديجة", "فاطمة"];
        for (let i = 1; i < words.length; i++) {
            if (femaleKeywords.includes(words[i]) || words[i].endsWith("ة") || words[i].endsWith("ى")) return "أنثى";
        }
        return "ذكر";
    }

    function getFormattedDate() {
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        return `${dd}-${mm}-${yyyy}`;
    }

    function getAcademicYear() {
        const today = new Date();
        const year = today.getFullYear();
        if (today.getMonth() >= 8) {
            return `${year}-${year + 1}`;
        } else {
            return `${year - 1}-${year}`;
        }
    }

    function extractSurname(fullName) {
        if (!fullName) return "";
        return fullName.trim().split(/\s+/)[0];
    }

    document.getElementById('excel-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet);
            
            rawData = json;
            
            const gridContainer = document.getElementById('review-grid-container');
            gridContainer.innerHTML = "";
            
            rawData.forEach((student, index) => {
                let currentSex = (student[sexKey] || "").trim();
                if (!currentSex || currentSex === "NaN" || currentSex === "undefined") {
                    currentSex = predictSexInitial(student[nameKey]);
                }
                student._computedSex = currentSex;

                const item = document.createElement('div');
                item.className = 'review-item';
                item.innerHTML = `
                    <span style="max-width:60%; font-weight:500;">${student[nameKey]}</span>
                    <select onchange="updateStudentSex(${index}, this.value)">
                        <option value="ذكر" ${currentSex === 'ذكر' ? 'selected' : ''}>ذكر</option>
                        <option value="أنثى" ${currentSex === 'أنثى' ? 'selected' : ''}>أنثى</option>
                    </select>
                `;
                gridContainer.appendChild(item);
            });
            
            document.getElementById('review-panel').style.display = "block";
            document.getElementById('file-info').innerText = `📊 تم تحميل ${json.length} تلميذ بنجاح. يرجى التدقيق ثم الضغط على زر التوليد.`;
        };
        reader.readAsArrayBuffer(file);
    });

    function updateStudentSex(index, newSex) {
        if(rawData[index]) {
            rawData[index]._computedSex = newSex;
        }
    }

    document.getElementById('process-btn').addEventListener('click', function() {
        if(rawData.length === 0) {
            alert("الرجاء رفع ملف الإكسل المرجع أولاً!");
            return;
        }

        const numGroups = parseInt(document.getElementById('groups-count').value);
        if(isNaN(numGroups) || numGroups < 2) {
            alert("الرجاء تحديد عدد أفواج صحيح.");
            return;
        }

        let groups = Array.from({ length: numGroups }, (_, i) => ({
            id: i + 1,
            students: [],
            stats: { males: 0, females: 0, repeatersMale: 0, repeatersFemale: 0, totalRepeaters: 0, totalGpa: 0 }
        }));

        let surnameCounts = {};
        rawData.forEach(student => {
            const surname = extractSurname(student[nameKey]);
            surnameCounts[surname] = (surnameCounts[surname] || 0) + 1;
        });

        let heavySurnamesStudents = [];
        let regularStudents = [];

        rawData.forEach(student => {
            const surname = extractSurname(student[nameKey]);
            student._gpa = parseFloat(student[gpaKey]) || 0;
            student._surname = surname;
            
            if (surnameCounts[surname] > 2) {
                heavySurnamesStudents.push(student);
            } else {
                regularStudents.push(student);
            }
        });

        regularStudents.sort((a, b) => b._gpa - a._gpa);
        heavySurnamesStudents.sort((a, b) => {
            if (a._surname !== b._surname) return a._surname.localeCompare(b._surname, "ar");
            return b._gpa - a._gpa;
        });

        let groupIndex = 0;

        function addStudentToGroup(student, gIdx) {
            groups[gIdx].students.push(student);
            
            const isRepeatStr = (student[repeatKey] || "").trim();
            const isRepeat = isRepeatStr.includes("نعم") || isRepeatStr.includes("معيد") || isRepeatStr.includes("م");
            const isFemale = student._computedSex === "أنثى";
            
            if(isFemale) {
                groups[gIdx].stats.females++;
                if(isRepeat) {
                    groups[gIdx].stats.repeatersFemale++;
                    groups[gIdx].stats.totalRepeaters++;
                }
            } else {
                groups[gIdx].stats.males++;
                if(isRepeat) {
                    groups[gIdx].stats.repeatersMale++;
                    groups[gIdx].stats.totalRepeaters++;
                }
            }
            groups[gIdx].stats.totalGpa += student._gpa;
        }

        heavySurnamesStudents.forEach(student => {
            addStudentToGroup(student, groupIndex);
            groupIndex = (groupIndex + 1) % numGroups;
        });

        let direction = 1;
        regularStudents.forEach(student => {
            addStudentToGroup(student, groupIndex);
            
            groupIndex += direction;
            if(groupIndex >= numGroups) { groupIndex = numGroups - 1; direction = -1; }
            else if(groupIndex < 0) { groupIndex = 0; direction = 1; }
        });

        processedGroups = groups;
        renderGroupsOfficialHTML();
        document.getElementById('export-excel-btn').style.display = "inline-flex";
    });

    document.getElementById('sort-alphabetical').addEventListener('change', function() {
        if(processedGroups.length > 0) {
            renderGroupsOfficialHTML();
        }
    });

    function renderGroupsOfficialHTML() {
        const container = document.getElementById('output-container');
        container.innerHTML = ""; 
        
        const currentDate = getFormattedDate();
        const academicYear = getAcademicYear();
        const isAlphabetical = document.getElementById('sort-alphabetical').checked;

        processedGroups.forEach(group => {
            const totalStudents = group.students.length;
            const avgGpa = totalStudents > 0 ? (group.stats.totalGpa / totalStudents).toFixed(2) : "0.00";
            
            let studentsDisplay = [...group.students];
            
            if (isAlphabetical) {
                studentsDisplay.sort((a, b) => (a[nameKey] || "").localeCompare(b[nameKey] || "", "ar"));
            } else {
                studentsDisplay.sort((a, b) => b._gpa - a._gpa);
            }

            let html = `
                <div class="print-page">
                    <div class="official-header">
                        <div class="header-center">الجمهورية الجزائرية الديمقراطية الشعبية</div>
                        <div class="header-center">وزارة التربية الوطنية</div>
                        
                        <div class="header-bottom-row">
                            <div class="header-right-side">
                                مديرية التربية لولاية ...............<br>
                                متوسطة .........................
                            </div>
                            <div class="header-left-side">
                                السنة الدراسية: ${academicYear}
                            </div>
                        </div>
                    </div>

                    <div class="document-title"><span>قائمة أسماء التلاميذ - الفوج التربوي رقم: ${group.id}</span></div>

                    <div class="group-stats-box">
                        <div class="stats-line">
                            <span>تعداد الفوج الإجمالي ⬅️ مج: <b>${totalStudents}</b></span>
                            <span>ذكر: <b>${group.stats.males}</b></span>
                            <span>أنثى: <b>${group.stats.females}</b></span>
                        </div>
                        <div class="stats-line" style="border-top: 1px dashed #000; padding-top: 2px; margin-top: 2px;">
                            <span>تعداد المعيدين ⬅️ مج: <b>${group.stats.totalRepeaters}</b></span>
                            <span>ذكر: <b>${group.stats.repeatersMale}</b></span>
                            <span>أنثى: <b>${group.stats.repeatersFemale}</b></span>
                            <span style="margin-right: auto; color: #000;">معدل الفوج الحسابي: <b>${avgGpa}</b></span>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:8%">الرقم</th>
                                    <th style="width:47%">اللقب و الاسم</th>
                                    <th style="width:15%">الجنس</th>
                                    <th style="width:15%">وضعية الإعادة</th>
                                    <th style="width:15%">المعدل السنوي</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            studentsDisplay.forEach((st, index) => {
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td style="text-align:right; padding-right:15px; font-weight:bold;">${st[nameKey]}</td>
                        <td>${st._computedSex}</td>
                        <td>${st[repeatKey] || 'لا'}</td>
                        <td style="font-weight:bold;">${st._gpa.toFixed(2)}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>

                    <div class="official-footer">
                        <div>.............. في: ${currentDate}</div>
                        <div style="margin-top: 3px; padding-left: 20px;">المديــــــر</div>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    document.getElementById('export-excel-btn').addEventListener('click', function() {
        if (processedGroups.length === 0) return;

        const wb = XLSX.utils.book_new();
        const isAlphabetical = document.getElementById('sort-alphabetical').checked;

        processedGroups.forEach(group => {
            let studentsDisplay = [...group.students];
            if (isAlphabetical) {
                studentsDisplay.sort((a, b) => (a[nameKey] || "").localeCompare(b[nameKey] || "", "ar"));
            } else {
                studentsDisplay.sort((a, b) => b._gpa - a._gpa);
            }

            let sheetData = [];
            
            sheetData.push(["الجمهورية الجزائرية الديمقراطية الشعبية"]);
            sheetData.push(["وزارة التربية الوطنية"]);
            sheetData.push(["مديرية التربية لولاية ..............", "", "", "", "السنة الدراسية: " + getAcademicYear()]);
            sheetData.push(["..............."]);
            sheetData.push([]);
            sheetData.push(["قائمة أسماء التلاميذ - الفوج التربوي رقم: " + group.id]);
            sheetData.push([]);
            sheetData.push(["تعداد الفوج الإجمالي: " + group.students.length, "ذكور: " + group.stats.males, "إناث: " + group.stats.females]);
            sheetData.push(["تعداد المعيدين: " + group.stats.totalRepeaters, "معدل الفوج الحسابي: " + (group.stats.totalGpa / group.students.length).toFixed(2)]);
            sheetData.push([]);
            
            sheetData.push(["الرقم", "اللقب و الاسم", "الجنس", "وضعية الإعادة", "المعدل السنوي"]);

            studentsDisplay.forEach((st, index) => {
                sheetData.push([
                    index + 1,
                    st[nameKey],
                    st._computedSex,
                    st[repeatKey] || 'لا',
                    st._gpa
                ]);
            });

            sheetData.push([]);
            sheetData.push(["", "", "", "أم الطيور في: " + getFormattedDate()]);
            sheetData.push(["", "", "", "المديــــــر"]);

            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            if(!ws['!views']) ws['!views'] = [{}];
            ws['!views'][0].RTL = true;

            ws['!cols'] = [
                { wch: 8 },  
                { wch: 35 }, 
                { wch: 12 }, 
                { wch: 15 }, 
                { wch: 15 }  
            ];
            XLSX.utils.book_append_sheet(wb, ws, `الفوج ${group.id}`);
        });

        XLSX.writeFile(wb, `الأفواج_التربوية_النهائية_${getFormattedDate()}.xlsx`);
    });
</script>

</body>
</html>
